<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 多币种追踪器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 600px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 8px 16px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .section {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .default-coins {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .coin-item {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .coin-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .coin-symbol {
      font-weight: 600;
      font-size: 16px;
    }

    .coin-full-name {
      font-size: 12px;
      opacity: 0.7;
    }

    .add-coin-form {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .input-group {
      flex: 1;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input:focus {
      border-color: #4CAF50;
      background: rgba(255, 255, 255, 0.15);
    }

    .add-btn {
      background: #4CAF50;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      align-self: flex-end;
      transition: all 0.3s;
    }

    .add-btn:hover {
      background: #45a049;
      transform: translateY(-2px);
    }

    .custom-coins-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .custom-coin-item {
      background: rgba(76, 175, 80, 0.1);
      border: 2px solid rgba(76, 175, 80, 0.3);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .remove-btn {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid rgba(244, 67, 54, 0.4);
      border-radius: 4px;
      padding: 6px 12px;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s;
    }

    .remove-btn:hover {
      background: rgba(244, 67, 54, 0.4);
    }

    .info-text {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 10px;
      line-height: 1.5;
    }

    .success-message {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid rgba(76, 175, 80, 0.4);
      border-radius: 6px;
      padding: 12px;
      margin-top: 10px;
      display: none;
    }

    .success-message.show {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>代币设置</h1>
    <button class="close-btn" id="closeBtn">关闭</button>
  </div>

  <div class="section">
    <div class="section-title">默认币种</div>
    <div class="default-coins">
      <div class="coin-item">
        <div class="coin-info">
          <div class="coin-symbol">BTC</div>
          <div class="coin-full-name">Bitcoin</div>
        </div>
      </div>
      <div class="coin-item">
        <div class="coin-info">
          <div class="coin-symbol">ETH</div>
          <div class="coin-full-name">Ethereum</div>
        </div>
      </div>
      <div class="coin-item">
        <div class="coin-info">
          <div class="coin-symbol">SOL</div>
          <div class="coin-full-name">Solana</div>
        </div>
      </div>
      <div class="coin-item">
        <div class="coin-info">
          <div class="coin-symbol">BNB</div>
          <div class="coin-full-name">Binance</div>
        </div>
      </div>
      <div class="coin-item">
        <div class="coin-info">
          <div class="coin-symbol">XRP</div>
          <div class="coin-full-name">Ripple</div>
        </div>
      </div>
      <div class="coin-item">
        <div class="coin-info">
          <div class="coin-symbol">ADA</div>
          <div class="coin-full-name">Cardano</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">添加自定义代币</div>

    <div class="add-coin-form">
      <div class="input-group">
        <label>代币符号（如：DOGE）</label>
        <input type="text" id="coinSymbol" placeholder="DOGE" maxlength="10">
      </div>
      <div class="input-group">
        <label>交易对（如：DOGEUSDT）</label>
        <input type="text" id="tradingPair" placeholder="DOGEUSDT" maxlength="20">
      </div>
      <button class="add-btn">添加</button>
    </div>

    <div class="info-text">
      💡 提示：交易对必须是Binance支持的格式，如 DOGEUSDT、SHIBUSDT 等。<br>
      添加后会在主界面显示，支持实时价格更新。
    </div>

    <div class="success-message" id="successMessage">
      ✅ 代币添加成功！请返回主界面查看。
    </div>

    <div class="section-title" style="margin-top: 20px;">我的自定义代币</div>
    <div class="custom-coins-list" id="customCoinsList">
      <div class="empty-state">暂无自定义代币</div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
